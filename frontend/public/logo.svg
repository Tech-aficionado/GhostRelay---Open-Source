<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Rounded square background with brand gradient -->
  <rect width="40" height="40" rx="10" fill="url(#logo-gradient)" />

  <!-- Ghost body -->
  <path
    d="M20 8c-5.5 0-10 4.2-10 9.5v12c0 .8.5 1.3 1 1 .6-.3 1.2-.3 1.8 0 .8.4 1.6.4 2.4 0 .8-.4 1.6-.4 2.4 0 .8.4 1.6.4 2.4 0 .8-.4 1.6-.4 2.4 0 .8.4 1.6.4 2.4 0 .6-.3 1.2-.3 1.8 0 .5.3 1-.2 1-1v-12C30 12.2 25.5 8 20 8z"
    fill="white"
    fill-opacity="0.95"
  />

  <!-- Ghost eyes -->
  <circle cx="16" cy="18" r="2.2" fill="url(#logo-gradient)" />
  <circle cx="24" cy="18" r="2.2" fill="url(#logo-gradient)" />

  <!-- Small mail envelope on the ghost body -->
  <rect x="15" y="22" width="10" height="6" rx="1" fill="url(#logo-gradient)" fill-opacity="0.8" />
  <path
    d="M15 22.5l5 3 5-3"
    stroke="white"
    stroke-width="1"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />

  <defs>
    <linearGradient id="logo-gradient" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#f97316" />
    </linearGradient>
  </defs>
</svg>
