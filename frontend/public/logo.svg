<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="GhostRelay">
  <defs>
    <linearGradient id="gr-tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#12182b"/>
      <stop offset="1" stop-color="#0a0e1a"/>
    </linearGradient>
    <linearGradient id="gr-ghost" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <rect width="40" height="40" rx="10" fill="url(#gr-tile)"/>
  <rect x="0.6" y="0.6" width="38.8" height="38.8" rx="9.4" fill="none" stroke="#7c3aed" stroke-opacity="0.35"/>

  <!-- ghost body -->
  <path d="M10.5 21 C10.5 14.4 14.7 10 20 10 C25.3 10 29.5 14.4 29.5 21 L29.5 30.2
           Q27.8 28.2 26.1 30.2 Q24.4 32.2 22.7 30.2 Q21 28.2 19.3 30.2
           Q17.6 32.2 15.9 30.2 Q14.4 28.4 12.6 30.2 Q11.6 31.2 10.5 30.2 Z"
        fill="url(#gr-ghost)"/>

  <!-- cheeks -->
  <ellipse cx="15" cy="23.4" rx="1.7" ry="1.1" fill="#06d6a0" opacity="0.4"/>
  <ellipse cx="25" cy="23.4" rx="1.7" ry="1.1" fill="#06d6a0" opacity="0.4"/>

  <!-- eyes -->
  <ellipse cx="16.6" cy="19.4" rx="1.9" ry="2.4" fill="#0a0e1a"/>
  <ellipse cx="23.4" cy="19.4" rx="1.9" ry="2.4" fill="#0a0e1a"/>
  <circle cx="17.3" cy="18.5" r="0.7" fill="#e8eaf6"/>
  <circle cx="24.1" cy="18.5" r="0.7" fill="#e8eaf6"/>

  <!-- smile -->
  <path d="M18.2 22.5 Q20 24.1 21.8 22.5" fill="none" stroke="#0a0e1a" stroke-width="0.9" stroke-linecap="round"/>
