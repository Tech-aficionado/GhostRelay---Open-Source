<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Email Alias</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Auth Section (shown when not logged in) -->
    <div id="authSection" class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <span class="logo">&#9993;</span>
                <h2 id="authTitle">Sign Up</h2>
            </div>
            <form id="authForm" onsubmit="handleAuth(event)">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="your.real@email.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Min 8 characters" required minlength="8">
                </div>
                <button type="submit" class="btn btn-primary btn-full" id="authBtn">Create Account</button>
            </form>
            <p class="auth-toggle">
                <span id="authToggleText">Already have an account?</span>
                <a href="#" onclick="toggleAuthMode()" id="authToggleLink">Login</a>
            </p>
        </div>
    </div>

    <!-- Dashboard Section (shown when logged in) -->
    <div id="dashboardSection" class="dashboard" style="display: none;">
        <nav class="navbar dashboard-nav">
            <div class="nav-brand">
                <span class="logo">&#9993;</span> EmailAlias
            </div>
            <div class="nav-links">
                <span class="user-email" id="userEmail"></span>
                <button class="btn btn-outline btn-small" onclick="logout()">Logout</button>
            </div>
        </nav>

        <div class="dashboard-content">
            <div class="dashboard-header">
                <div>
                    <h1>Your Aliases</h1>
                    <p class="alias-count">
                        <span id="aliasCount">0</span> / <span id="aliasLimit">5</span> aliases used
                    </p>
                </div>
                <button class="btn btn-primary" onclick="showCreateModal()" id="createBtn">
                    + New Alias
                </button>
            </div>

            <!-- Stats Cards -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number" id="totalAliases">0</div>
                    <div class="stat-label">Total Aliases</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="activeAliases">0</div>
                    <div class="stat-label">Active</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="totalForwarded">0</div>
                    <div class="stat-label">Emails Forwarded</div>
                </div>
            </div>

            <!-- Alias List -->
            <div class="alias-list" id="aliasList">
                <div class="empty-state" id="emptyState">
                    <div class="empty-icon">&#128236;</div>
                    <h3>No aliases yet</h3>
                    <p>Create your first alias to start protecting your privacy.</p>
                    <button class="btn btn-primary" onclick="showCreateModal()">Create First Alias</button>
                </div>
            </div>
        </div>

        <!-- Create Alias Modal -->
        <div class="modal" id="createModal" style="display: none;">
            <div class="modal-overlay" onclick="hideCreateModal()"></div>
            <div class="modal-content">
                <h2>Create New Alias</h2>
                <form onsubmit="createAlias(event)">
                    <div class="form-group">
                        <label for="aliasLabel">Label (optional)</label>
                        <input type="text" id="aliasLabel" placeholder="e.g. Shopping, Newsletter, Social Media">
                        <span class="form-hint">A note to help you remember what this alias is for.</span>
                    </div>
                    <div class="form-group">
                        <label>Generated Alias Preview</label>
                        <div class="alias-preview" id="aliasPreview">
                            <span id="previewAddress">Loading...</span>
                            <button type="button" class="btn btn-small btn-outline" onclick="regenerateAlias()">&#8635; Regenerate</button>
                        </div>
                    </div>
                    <div class="modal-actions">
                        <button type="button" class="btn btn-outline" onclick="hideCreateModal()">Cancel</button>
                        <button type="submit" class="btn btn-primary">Create Alias</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
