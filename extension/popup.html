<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GhostRelay</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 340px;
      min-height: 200px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0c111d;
      color: #e2e8f0;
      overflow-x: hidden;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 20px;
      border-bottom: 1px solid rgba(99, 102, 241, 0.1);
      background: linear-gradient(180deg, rgba(20, 184, 166, 0.05) 0%, transparent 100%);
    }
    .header img {
      width: 28px;
      height: 28px;
      border-radius: 7px;
    }
    .header .logo-placeholder {
      width: 28px;
      height: 28px;
      border-radius: 7px;
      background: linear-gradient(135deg, #14b8a6, #22d3ee, #a78bfa);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .header .logo-placeholder svg {
      width: 18px;
      height: 18px;
    }
    .header h1 {
      font-size: 15px;
      font-weight: 700;
      color: #f1f5f9;
      letter-spacing: -0.3px;
    }
    .header h1 span {
      background: linear-gradient(135deg, #14b8a6, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* Content area */
    .content {
      padding: 16px 20px 20px;
    }

    /* Sections */
    .section { display: none; }
    .section.active { display: block; }

    /* Form elements */
    .form-group {
      margin-bottom: 10px;
    }
    .form-group label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: #94a3b8;
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #f1f5f9;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus {
      border-color: #14b8a6;
      box-shadow: 0 0 0 3px rgba(20, 184, 166, 0.1);
    }
    input::placeholder { color: #64748b; }

    /* Buttons */
    .btn {
      width: 100%;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-primary {
      background: linear-gradient(135deg, #14b8a6, #22d3ee);
      color: #0c111d;
    }
    .btn-primary:hover:not(:disabled) {
      box-shadow: 0 4px 12px rgba(20, 184, 166, 0.3);
      transform: translateY(-1px);
    }

    .btn-ghost {
      background: transparent;
      border: 1px solid #334155;
      color: #94a3b8;
    }
    .btn-ghost:hover:not(:disabled) {
      border-color: #14b8a6;
      color: #14b8a6;
    }

    .btn-accent {
      background: linear-gradient(135deg, #6366f1, #a78bfa);
      color: white;
    }
    .btn-accent:hover:not(:disabled) {
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
      transform: translateY(-1px);
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      margin: 14px 0;
      gap: 10px;
    }
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #334155;
    }
    .divider span {
      font-size: 11px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Status messages */
    .status {
      font-size: 11px;
      text-align: center;
      margin-top: 10px;
      min-height: 16px;
      transition: all 0.2s;
    }
    .status.success { color: #14b8a6; }
    .status.error { color: #f43f5e; }
    .status.info { color: #94a3b8; }

    /* User info badge */
    .user-badge {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: #1e293b;
      border-radius: 8px;
      margin-bottom: 14px;
      border: 1px solid #334155;
    }
    .user-badge.visible { display: flex; }
    .user-badge .avatar {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: linear-gradient(135deg, #14b8a6, #a78bfa);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      color: white;
    }
    .user-badge .email {
      font-size: 12px;
      color: #94a3b8;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Alias result */
    .alias-result {
      display: none;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 12px;
      margin-top: 12px;
    }
    .alias-result.visible { display: block; }
    .alias-result .alias-label {
      font-size: 10px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .alias-result .alias-value {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .alias-result .alias-text {
      font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
      font-size: 12px;
      color: #14b8a6;
      word-break: break-all;
      flex: 1;
      line-height: 1.4;
    }
    .alias-result .copy-btn {
      background: none;
      border: 1px solid #334155;
      color: #94a3b8;
      padding: 5px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 11px;
      font-weight: 500;
      white-space: nowrap;
      transition: all 0.2s;
    }
    .alias-result .copy-btn:hover {
      border-color: #14b8a6;
      color: #14b8a6;
    }
    .alias-result .copy-btn.copied {
      border-color: #14b8a6;
      color: #14b8a6;
      background: rgba(20, 184, 166, 0.1);
    }

    /* Action buttons row */
    .actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }
    .actions .btn {
      flex: 1;
      padding: 8px 12px;
      font-size: 12px;
    }

    /* Fill button */
    .fill-btn {
      display: none;
      width: 100%;
      padding: 8px;
      background: transparent;
      border: 1px solid #14b8a6;
      border-radius: 8px;
      color: #14b8a6;
      font-weight: 500;
      font-size: 12px;
      cursor: pointer;
      margin-top: 10px;
      transition: all 0.2s;
    }
    .fill-btn.visible { display: block; }
    .fill-btn:hover {
      background: rgba(20, 184, 166, 0.1);
    }

    /* Footer */
    .footer {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid #1e293b;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .footer a {
      color: #64748b;
      font-size: 11px;
      text-decoration: none;
      transition: color 0.2s;
    }
    .footer a:hover { color: #14b8a6; }
    .footer .logout-btn {
      background: none;
      border: none;
      color: #64748b;
      font-size: 11px;
      cursor: pointer;
      transition: color 0.2s;
    }
    .footer .logout-btn:hover { color: #f43f5e; }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="logo-placeholder">
      <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M20 8c-5.5 0-10 4.2-10 9.5v12c0 .8.5 1.3 1 1 .6-.3 1.2-.3 1.8 0 .8.4 1.6.4 2.4 0 .8-.4 1.6-.4 2.4 0 .8.4 1.6.4 2.4 0 .8-.4 1.6-.4 2.4 0 .8.4 1.6.4 2.4 0 .6-.3 1.2-.3 1.8 0 .5.3 1-.2 1-1v-12C30 12.2 25.5 8 20 8z" fill="white" fill-opacity="0.95"/>
        <circle cx="16" cy="18" r="2.2" fill="#0c111d"/>
        <circle cx="24" cy="18" r="2.2" fill="#0c111d"/>
        <rect x="15" y="22" width="10" height="6" rx="1.5" fill="#0c111d" fill-opacity="0.3"/>
        <path d="M15 22.5l5 3 5-3" stroke="white" stroke-width="1" stroke-linecap="round" fill="none"/>
      </svg>
    </div>
    <h1>Ghost<span>Relay</span></h1>
  </div>

  <div class="content">
    <!-- Login Section -->
    <div id="login-section" class="section active">
      <div class="form-group">
        <input type="email" id="login-email" placeholder="you@email.com" aria-label="Email address">
      </div>
      <div class="form-group">
        <input type="password" id="login-password" placeholder="Password" aria-label="Password">
      </div>
      <button class="btn btn-primary" id="login-btn">Sign In</button>

      <div class="divider"><span>or</span></div>

      <button class="btn btn-ghost" id="web-login-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        Sign in on GhostRelay.me
      </button>

      <div class="status" id="login-status" role="alert" aria-live="polite"></div>
    </div>

    <!-- Main Section -->
    <div id="main-section" class="section">
      <div class="user-badge" id="user-badge">
        <div class="avatar" id="user-avatar">?</div>
        <span class="email" id="user-email"></span>
      </div>

      <div class="form-group">
        <label for="alias-label">Label (optional)</label>
        <input type="text" id="alias-label" placeholder="e.g. Netflix, Amazon, newsletter...">
      </div>

      <button class="btn btn-accent" id="generate-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
        Generate Alias
      </button>

      <div class="alias-result" id="alias-result">
        <div class="alias-label">New alias created</div>
        <div class="alias-value">
          <span class="alias-text" id="alias-text"></span>
          <button class="copy-btn" id="copy-btn">Copy</button>
        </div>
      </div>

      <button class="fill-btn" id="fill-btn">
        ↳ Fill into email field on page
      </button>

      <div class="status" id="main-status" role="alert" aria-live="polite"></div>

      <div class="footer">
        <a href="https://ghostrelay.me/dashboard" target="_blank">Dashboard ↗</a>
        <button class="logout-btn" id="logout-btn">Sign out</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
